<!--__________ Main __________-->
<main class="book" id="main">
	<h3 class="book__h3">Book a Table</h3>
	<form class="book__form" action="#" method="post">
		<label class="book__label" for="fullName">Full name:
			<input class="book__input" type="text" name="fullName" id="fullName">
		</label>
		<label class="book__label" for="phone">Phone Number:
			<input class="book__input" type="tel" name="phone" id="phone" required>
		</label>
		<label class="book__label" for="email">E-Mail:
			<input class="book__input" type="email" name="email" id="email" required>
		</label>
		<label class="book__label" for="date">Date of reservation:
			<input class="book__input" type="datetime-local" name="date" id="date" required>
		</label>
		<label class="book__label" for="time">Time of reservation (hs):
			<input class="book__input" type="number" name="time" id="time" required min="1" max="5" value="2">
		</label>
		<label class="book__label" for="guest">Guests:
			<input class="book__input" type="number" name="guest" id="guest" required min="1" max="12"
					value="4">
		</label>
		<label class="book__label" for="requests">Special requests:
			<textarea class="book__textarea" name="requests" id="requests"></textarea>
		</label>
		<button class="book__submit" type="submit">Send the Book</button>
	</form>
</main>
